<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP Page Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1 id="page-title"></h1>
    <p id="instructions" class="subtitle"></p>

    <div class="button-row">
      <button id="random-scp-btn"></button>
      <button id="random-tale-btn"></button>
      <button id="random-goi-btn"></button>
      <button id="random-art-btn"></button>
    </div>

    <p id="status" class="status"></p>

    <section id="result-card" class="card hidden">
      <p class="type" id="result-type"></p>
      <h2 id="result-title"></h2>

      <div class="meta">
        <p id="result-scp-number" class="hidden"></p>
        <p id="result-rating"></p>
      </div>

      <div>
        <h3 id="tags-label"></h3>
        <div id="result-tags" class="tags"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
